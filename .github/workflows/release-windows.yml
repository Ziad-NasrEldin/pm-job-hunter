name: release-windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      SIGN_RELEASE: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run tests
        run: python -m pytest -q

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build EXE and Installer
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\build_installer.ps1 `
            -PythonExe python `
            -Version "${{ github.ref_name }}" `
            -InnoCompiler "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"

      - name: Prepare release assets
        shell: powershell
        run: |
          Copy-Item ".\.env.local.example" ".\dist\env.local.example" -Force
          $hashes = @()
          $hashes += (Get-FileHash ".\dist\PMJobHunter.exe" -Algorithm SHA256).Hash.ToLower() + "  PMJobHunter.exe"
          $hashes += (Get-FileHash ".\dist\PMJobHunter-Setup.exe" -Algorithm SHA256).Hash.ToLower() + "  PMJobHunter-Setup.exe"
          Set-Content -Path ".\dist\SHA256SUMS.txt" -Value $hashes -Encoding ascii

      - name: Sign artifacts (optional, disabled by default)
        if: ${{ env.SIGN_RELEASE == 'true' }}
        shell: powershell
        run: |
          Write-Host "Signing is disabled. Enable SIGN_RELEASE and add signtool command with your certificate."

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/PMJobHunter.exe
            dist/PMJobHunter-Setup.exe
            dist/env.local.example
            dist/SHA256SUMS.txt
          generate_release_notes: true
